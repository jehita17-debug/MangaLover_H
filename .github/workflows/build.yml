name: Generate & Deploy

# tsumitate-navi と同じ思想：push したら勝手に生成→ビルド→公開。
on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "templates/**"
      - "assets/**"
      - "scripts/**"
      - "prompts/**"
      - ".github/workflows/build.yml"
  workflow_dispatch: {} # 手動実行も可

permissions:
  contents: write   # 生成結果をコミットし戻すため
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # 1) draft エントリを Claude API で生成（本文・タグ・比較）
      - name: Generate reviews
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run generate

      # 2) 生成結果をリポジトリにコミットし戻す（再生成防止＝published 化を保存）
      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --staged --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: auto-generate reviews [skip ci]"
            git push
          fi

      # 3) 静的ビルド
      - name: Build site
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
